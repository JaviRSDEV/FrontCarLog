<div class="card bg-dark border-secondary text-white shadow-sm">
  <div class="card-header border-secondary bg-transparent">
    <h5 class="mb-0"><i class="bi bi-people me-2"></i>Plantilla Actual</h5>
  </div>
  <div class="table-responsive">
    <table class="table table-dark table-hover mb-0 align-middle">
      <thead>
        <tr class="text-primary border-secondary">
          <th>Nombre</th>
          <th>DNI</th>
          <th>Email</th>
          <th>Rol</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (emp of empleados; track emp.dni) {
          <tr class="border-secondary">
            <td class="fw-bold">{{ emp.name | uppercase }}</td>
            <td>{{ emp.dni }}</td>
            <td>{{ emp.email }}</td>
            <td>
              <span
                class="badge"
                [ngClass]="emp.role === 'CO_MANAGER' ? 'bg-warning text-dark' : 'bg-info text-dark'"
              >
                {{ emp.role }}
              </span>
            </td>

            <td class="text-end">
              @if (emp.dni !== managerDni) {
                <button class="btn btn-outline-danger btn-sm fw-bold" (click)="despedir(emp.dni)">
                  <i class="bi bi-person-x-fill me-1"></i> Despedir
                </button>
              }
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" class="text-center py-4 text-white-50">
              No hay empleados contratados.
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
