<nav class="sidebar">
  @if (isLoggedIn()) {
    <button
      [routerLink]="['/dashboard']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="btn w-100 d-flex justify-content-center align-items-center mb-3"
      title="Inicio"
    >
      <i class="bi bi-house-door-fill"></i>
    </button>

    <button
      [routerLink]="['/dashboard/vehiculos']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="btn w-100 d-flex justify-content-center align-items-center mb-3"
      title="Vehículos"
    >
      <i class="bi bi-car-front-fill"></i>
    </button>

    <button
      [routerLink]="['/dashboard/mantenimientos']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="btn w-100 d-flex justify-content-center align-items-center mb-3"
      title="Mantenimientos"
    >
      <i class="bi bi-tools"></i>
    </button>

    @if (isManager()) {
      <button
        [routerLink]="['/dashboard/workShop']"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="btn w-100 d-flex justify-content-center align-items-center mb-3"
        title="Configuración del Taller"
      >
        <i class="bi bi-shop"></i>
      </button>
    }

    <button
      [routerLink]="['/dashboard/taller']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="btn w-100 d-flex justify-content-center align-items-center mb-3"
      title="Mi Perfil"
    >
      <i class="bi bi-person-badge fs-5"></i>
    </button>

    <button
      (click)="cerrarSesion()"
      class="btn w-100 d-flex justify-content-center align-items-center mb-3 text-danger"
      title="Cerrar Sesión"
    >
      <i class="bi-box-arrow-right"></i>
    </button>
  }
</nav>
