<nav class="sidebar">
  @if (!isManager) {
    <!--Botón de home o pantalla principal-->
    <button
      [routerLink]="['/dashboard']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="btn w-100 d-flex justify-content-center align-items-center mb-3"
    >
      <i class="bi bi-house-door-fill"></i>
    </button>
    <!--Botón de busqueda-->
    <button
      [routerLink]="['/buscar']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="btn w-100 d-flex justify-content-center align-items-center mb-3"
    >
      <i class="bi bi-search"></i>
    </button>
    <!--Botón para carrusel de vehículos-->
    <button
      [routerLink]="['/dashboard/vehiculos']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="btn w-100 d-flex justify-content-center align-items-center mb-3"
    >
      <i class="bi bi-car-front-fill"></i>
    </button>
    <!--Botón de acceso a los mantenimientos-->
    <button
      [routerLink]="['/dashboard/mantenimientos']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="btn w-100 d-flex justify-content-center align-items-center mb-3"
    >
      <i class="bi bi-tools"></i>
    </button>
    <button
      [routerLink]="['/dashboard/taller']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="btn w-100 d-flex justify-content-center align-items-center mb-3"
    >
      <i class="bi bi-person-badge fs-5 me-2"></i>
    </button>
    <!--Botón para cerrar sesión-->
    <button
      (click)="cerrarSesion()"
      class="btn w-100 d-flex justify-content-center align-items-center mb-3"
    >
      <i class="bi-box-arrow-right"></i>
    </button>
  }
</nav>
